<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Zeno Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { position: relative; z-index: 1; width: 100%; max-width: 400px; }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--muted); text-decoration: none; font-size: 0.82rem;
            font-weight: 600; letter-spacing: 0.5px; margin-bottom: 24px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--blue-bright); }
        .card-logo { font-family: 'Exo 2', sans-serif; font-size: 1.2rem; font-weight: 900; color: var(--blue-bright); letter-spacing: 2px; margin-bottom: 4px; }
        .card-logo span { color: var(--text); }
        .card-title { font-family: 'Exo 2', sans-serif; font-size: 1.6rem; font-weight: 900; margin-bottom: 4px; }
        .card-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 28px; }
        .divider { display: flex; align-items: center; gap: 10px; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border2); }
        .divider span { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; }
        .bottom-link { text-align: center; font-size: 0.88rem; color: var(--muted); }
        .bottom-link a { color: var(--blue-bright); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="glow-blue"></div>
    <div class="container">
        <a href="/" class="back-link">← Kembali</a>
        <div class="card card-top-line">
            <div class="card-logo">ZENO<span>STORE</span></div>
            <h1 class="card-title">LOGIN</h1>
            <p class="card-sub">Masuk ke akun kamu</p>

            <div class="alert alert-error" id="alertError"></div>
            <div class="alert alert-success" id="alertSuccess"></div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="email@kamu.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button class="btn btn-primary btn-full" id="btnLogin" onclick="handleLogin()">MASUK</button>

            <div class="divider"><span>atau</span></div>
            <div class="bottom-link">Belum punya akun? <a href="/register">Daftar Sekarang</a></div>
        </div>
    </div>
    <script>
        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            hide('alertError'); hide('alertSuccess');

            if (!email || !password) return showAlert('alertError', 'Email dan password harus diisi!');

            btn.disabled = true; btn.textContent = 'MEMPROSES...';
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('zenoUser', JSON.stringify({ username: data.username, userId: data.userId, email: data.email }));
                    showAlert('alertSuccess', `Selamat datang, ${data.username}!`);
                    setTimeout(() => window.location.href = '/dashboard', 1200);
                } else {
                    showAlert('alertError', data.message);
                    btn.disabled = false; btn.textContent = 'MASUK';
                }
            } catch {
                showAlert('alertError', 'Terjadi kesalahan. Coba lagi.');
                btn.disabled = false; btn.textContent = 'MASUK';
            }
        }
        function showAlert(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = 'block'; }
        function hide(id) { document.getElementById(id).style.display = 'none'; }
    </script>
    <script src="/navbar.js"></script>
    <script>initNavbar("login");</script>
</body>
</html>
