<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Zeno Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .wrap { position:relative; z-index:1; width:100%; max-width:400px; }
        .back { display:inline-flex; align-items:center; gap:6px; color:var(--text2); text-decoration:none; font-size:0.82rem; font-weight:500; margin-bottom:28px; transition:color 0.2s; }
        .back:hover { color:var(--purple2); }
        .logo { font-weight:700; font-size:1.1rem; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:6px; }
        .title { font-size:1.8rem; font-weight:700; letter-spacing:-1px; margin-bottom:4px; }
        .sub { color:var(--text2); font-size:0.88rem; margin-bottom:28px; }
        .divider { display:flex; align-items:center; gap:10px; margin:20px 0; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border2); }
        .divider span { font-size:0.72rem; color:var(--muted); }
        .bottom { text-align:center; font-size:0.88rem; color:var(--text2); }
        .bottom a { color:var(--purple2); text-decoration:none; font-weight:600; }
    </style>
</head>
<body>
    <div class="bg-anim"><div class="bg-grid"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
    <div class="wrap">
        <a href="/" class="back">← Kembali</a>
        <div class="card card-glow">
            <div class="logo">ZenoStore</div>
            <h1 class="title">Selamat Datang</h1>
            <p class="sub">Masuk ke akun kamu</p>

            <div class="alert alert-error" id="alertError"></div>
            <div class="alert alert-success" id="alertSuccess"></div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="email@kamu.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button class="btn btn-primary btn-full" id="btnLogin" onclick="handleLogin()">Masuk</button>
            <div class="divider"><span>atau</span></div>
            <div class="bottom">Belum punya akun? <a href="/register">Daftar Sekarang</a></div>
        </div>
    </div>
    <script>
        document.addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            hide('alertError'); hide('alertSuccess');
            if (!email || !password) return show('alertError', 'Email dan password harus diisi!');
            btn.disabled = true; btn.textContent = 'Memproses...';
            try {
                const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password}) });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('zenoUser', JSON.stringify({username:data.username,userId:data.userId,email:data.email}));
                    show('alertSuccess', 'Berhasil! Mengalihkan...');
                    setTimeout(() => location.href='/dashboard', 1200);
                } else {
                    show('alertError', data.message);
                    btn.disabled = false; btn.textContent = 'Masuk';
                }
            } catch { show('alertError','Terjadi kesalahan. Coba lagi.'); btn.disabled=false; btn.textContent='Masuk'; }
        }
        function show(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block';}
        function hide(id){document.getElementById(id).style.display='none';}
    </script>
    <script src="/navbar.js"></script>
    <script>initNavbar('login');</script>
</body>
</html>
