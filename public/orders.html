<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Saya — Zeno Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-wrap { position:relative; z-index:1; padding:100px 16px 60px; max-width:800px; margin:0 auto; }
        .page-title { font-family:'Exo 2',sans-serif; font-size:clamp(1.5rem,4vw,2rem); font-weight:900; margin-bottom:4px; }
        .page-sub { color:var(--text2); font-size:0.85rem; margin-bottom:24px; }

        .filter-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
        .tab-btn { padding:7px 16px; border-radius:20px; font-family:'Sora',sans-serif; font-size:0.78rem; font-weight:700; cursor:pointer; transition:all 0.2s; border:1px solid var(--border2); background:transparent; color:var(--muted); }
        .tab-btn.active, .tab-btn:hover { background:var(--blue); color:#fff; border-color:var(--blue); }

        .order-card { background:var(--card); border:1px solid var(--border2); border-radius:12px; margin-bottom:12px; overflow:hidden; transition:border-color 0.2s; }
        .order-card:hover { border-color:rgba(59,130,246,0.3); }
        .order-head { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border2); flex-wrap:wrap; gap:8px; }
        .order-id-txt { font-family:'Exo 2',sans-serif; font-size:0.82rem; font-weight:800; color:var(--blue-bright); }
        .order-date { font-size:0.72rem; color:var(--muted); }
        .order-body { padding:14px 16px; display:flex; align-items:center; gap:12px; }
        .order-product-img { width:52px; height:52px; border-radius:8px; object-fit:cover; background:var(--dark3); flex-shrink:0; }
        .order-info { flex:1; min-width:0; }
        .order-name { font-weight:700; font-size:0.88rem; color:var(--text); margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .order-method { font-size:0.75rem; color:var(--muted); }
        .order-right { text-align:right; flex-shrink:0; }
        .order-price { font-family:'Exo 2',sans-serif; font-size:0.95rem; font-weight:900; color:var(--blue-bright); }

        .order-foot { padding:10px 16px; background:rgba(0,0,0,0.15); border-top:1px solid var(--border2); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; }
        .status-msg { font-size:0.78rem; color:var(--text2); flex:1; }

        /* Download button */
        .btn-download { padding:8px 18px; background:var(--success); color:#fff; border:none; border-radius:8px; font-family:'Sora',sans-serif; font-size:0.8rem; font-weight:700; cursor:pointer; transition:all 0.2s; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
        .btn-download:hover { background:#16a34a; transform:translateY(-1px); }

        .btn-detail { padding:6px 14px; background:transparent; border:1px solid var(--border2); color:var(--text2); border-radius:6px; font-family:'Sora',sans-serif; font-size:0.75rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
        .btn-detail:hover { border-color:var(--blue); color:var(--blue-bright); }

        /* Timeline */
        .timeline { padding:14px 16px 0; border-top:1px solid var(--border2); display:none; }
        .tl-item { display:flex; gap:10px; margin-bottom:12px; }
        .tl-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:3px; }
        .tl-done { background:var(--success); }
        .tl-active { background:var(--blue-bright); box-shadow:0 0 0 3px rgba(96,165,250,0.2); }
        .tl-pending { background:var(--border2); }
        .tl-label { font-size:0.82rem; font-weight:700; color:var(--text); display:block; margin-bottom:1px; }
        .tl-time { font-size:0.72rem; color:var(--muted); }

        .empty-box { text-align:center; padding:50px 20px; color:var(--muted); background:var(--card); border:1px dashed var(--border2); border-radius:12px; }
        .empty-box .big { font-size:2.5rem; margin-bottom:10px; }
        .empty-box p { font-size:0.85rem; margin-bottom:16px; }

        footer { position:relative; z-index:1; text-align:center; padding:24px; border-top:1px solid var(--border2); color:var(--muted); font-size:0.8rem; }
        footer span { color:var(--blue-bright); }
    </style>
</head>
<body>
    <div class="bg-anim"><div class="bg-grid"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
    <nav>
        <a href="/" class="nav-logo">ZenoStore</a>
        <ul class="nav-links">
            <li><a href="/products">Produk</a></li>
            <li><a href="/orders" style="color:var(--blue-bright)">Pesanan</a></li>
        </ul>
        <div class="nav-buttons" id="navButtons"></div>
    </nav>

    <div class="page-wrap">
        <div class="section-tag">// Riwayat</div>
        <h1 class="page-title">PESANAN SAYA</h1>
        <p class="page-sub">Pantau status pesanan & download produk kamu</p>

        <div class="filter-tabs">
            <button class="tab-btn active" onclick="filterOrders('all',this)">Semua</button>
            <button class="tab-btn" onclick="filterOrders('pending',this)">Menunggu</button>
            <button class="tab-btn" onclick="filterOrders('confirming',this)">Dikonfirmasi</button>
            <button class="tab-btn" onclick="filterOrders('paid',this)">Selesai</button>
        </div>

        <div id="orderList">
            <div class="empty-box"><div class="big">⏳</div><p>Memuat pesanan...</p></div>
        </div>
    </div>

    <footer><p>© 2024 <span>Zeno Store</span> — All Rights Reserved</p></footer>

    <script>
        const user = JSON.parse(localStorage.getItem('zenoUser') || 'null');
        if (!user) window.location.href = '/login';

        let allOrders = [];
        let productMap = {};

        function statusBadge(s) {
            return { pending:['badge-warning','Menunggu Bukti'], confirming:['badge-blue','Dikonfirmasi'], paid:['badge-success','Selesai'], cancelled:['badge-error','Dibatalkan'] }[s] || ['badge-warning','Menunggu'];
        }
        function statusMsg(s) {
            return { pending:'Silakan kirim bukti pembayaran via WhatsApp admin.', confirming:'Bukti diterima. Admin sedang mengkonfirmasi (maks 1x24 jam).', paid:'Pembayaran dikonfirmasi! Klik tombol Download untuk mengunduh produk.', cancelled:'Pesanan dibatalkan.' }[s] || '';
        }

        function getTimeline(o) {
            const steps = [
                { label:'Pesanan Dibuat', done:true, time: fmt(o.createdAt) },
                { label:'Bukti Dikirim', done: o.status !== 'pending', time: o.confirmedAt ? fmt(o.confirmedAt) : '' },
                { label:'Dikonfirmasi Admin', done: o.status === 'paid', time: o.approvedAt ? fmt(o.approvedAt) : '' },
                { label:'Selesai', done: o.status === 'paid', time: '' },
            ];
            return steps.map((s,i) => {
                const dotClass = s.done ? 'tl-done' : (i === steps.findIndex(x=>!x.done) ? 'tl-active' : 'tl-pending');
                return `<div class="tl-item"><div class="tl-dot ${dotClass}"></div><div><span class="tl-label">${s.label}</span><span class="tl-time">${s.time || (s.done?'':'Menunggu...')}</span></div></div>`;
            }).join('');
        }

        function fmt(d) { return new Date(d).toLocaleString('id-ID',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); }

        async function downloadProduct(orderId) {
            try {
                const res = await fetch('/api/download/' + orderId);
                const data = await res.json();
                if (data.success) {
                    window.open(data.downloadLink, '_blank');
                } else {
                    alert(data.message);
                }
            } catch { alert('Gagal memuat link download.'); }
        }

        function renderOrders(orders) {
            const list = document.getElementById('orderList');
            if (!orders.length) {
                list.innerHTML = `<div class="empty-box"><div class="big">📭</div><p>Tidak ada pesanan</p><a href="/products" class="btn btn-primary">Belanja Sekarang</a></div>`;
                return;
            }
            list.innerHTML = orders.slice().reverse().map(o => {
                const [bc, bl] = statusBadge(o.status);
                const prod = productMap[o.productId] || {};
                const payLabel = { dana:'Dana', gopay:'GoPay', qris:'QRIS' }[o.paymentMethod] || o.paymentMethod;
                return `
                <div class="order-card">
                    <div class="order-head">
                        <div><div class="order-id-txt">${o.orderId}</div><div class="order-date">${fmt(o.createdAt)}</div></div>
                        <span class="badge ${bc}">${bl}</span>
                    </div>
                    <div class="order-body">
                        <img class="order-product-img" src="${prod.img||''}" alt="${o.productName}" onerror="this.style.opacity='0.3'">
                        <div class="order-info">
                            <div class="order-name">${o.productName}</div>
                            <div class="order-method">${payLabel}</div>
                        </div>
                        <div class="order-right"><div class="order-price">${o.price}</div></div>
                    </div>
                    <div class="timeline" id="tl-${o.orderId}">${getTimeline(o)}</div>
                    <div class="order-foot">
                        <div class="status-msg">${statusMsg(o.status)}</div>
                        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
                            <button class="btn-detail" onclick="toggleTl('${o.orderId}')">Detail</button>
                            ${o.status === 'paid' ? `<button class="btn-download" onclick="downloadProduct('${o.orderId}')">Download</button>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleTl(id) {
            const el = document.getElementById('tl-'+id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function filterOrders(status, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderOrders(status === 'all' ? allOrders : allOrders.filter(o => o.status === status));
        }

        async function load() {
            try {
                const [ordersRes, productsRes] = await Promise.all([
                    fetch('/api/orders/' + user.userId),
                    fetch('/api/products')
                ]);
                const ordersData   = await ordersRes.json();
                const productsData = await productsRes.json();
                allOrders = ordersData.orders || [];
                productsData.products.forEach(p => { productMap[p.id] = p; });
                renderOrders(allOrders);
            } catch {
                document.getElementById('orderList').innerHTML = '<div class="empty-box"><div class="big">⚠️</div><p>Gagal memuat. Refresh halaman.</p></div>';
            }
        }

        load();
    </script>
    <script src="/navbar.js"></script>
    <script>initNavbar('orders');</script>
</body>
</html>
