<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produk — Zeno Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-hero { position:relative; z-index:1; padding:110px 20px 28px; text-align:center; }
        .page-hero h1 { font-family:'Exo 2',sans-serif; font-size:clamp(1.6rem,5vw,2.8rem); font-weight:900; margin-bottom:8px; }
        .page-hero p { color:var(--text2); font-size:0.88rem; max-width:400px; margin:0 auto; }

        .filter-bar { position:relative; z-index:1; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; padding:0 16px 24px; }
        .filter-btn { padding:7px 18px; border-radius:20px; font-family:'Sora',sans-serif; font-size:0.8rem; font-weight:700; cursor:pointer; transition:all 0.2s; border:1px solid var(--border2); background:transparent; color:var(--muted); }
        .filter-btn.active, .filter-btn:hover { background:var(--blue); color:#fff; border-color:var(--blue); }

        .products-wrap { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:0 16px 60px; }
        .products-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:16px; }

        .product-card { background:var(--card); border:1px solid var(--border2); border-radius:14px; overflow:hidden; transition:all 0.3s; display:flex; flex-direction:column; }
        .product-card:hover { border-color:rgba(59,130,246,0.5); transform:translateY(-4px); box-shadow:0 16px 40px rgba(0,0,0,0.4); }
        .product-img-wrap { position:relative; width:100%; height:160px; overflow:hidden; background:var(--dark3); flex-shrink:0; }
        .product-img-wrap img { width:100%; height:100%; object-fit:cover; transition:transform 0.4s; display:block; }
        .product-card:hover .product-img-wrap img { transform:scale(1.06); }
        .product-img-fallback { width:100%; height:100%; display:none; flex-direction:column; align-items:center; justify-content:center; gap:6px; color:var(--muted); }
        .product-img-fallback .fi { font-size:2.2rem; }
        .product-img-fallback span { font-size:0.7rem; letter-spacing:1px; text-transform:uppercase; }
        .product-badge-pos { position:absolute; top:10px; right:10px; }
        .product-body { padding:16px; flex:1; display:flex; flex-direction:column; }
        .product-cat { font-size:0.68rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--blue-bright); margin-bottom:4px; }
        .product-name { font-family:'Exo 2',sans-serif; font-size:0.95rem; font-weight:800; color:var(--text); margin-bottom:6px; }
        .product-desc { font-size:0.8rem; color:var(--text2); line-height:1.5; margin-bottom:12px; flex:1; }
        .product-footer { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:auto; }
        .product-price { font-family:'Exo 2',sans-serif; font-size:0.98rem; font-weight:900; color:var(--blue-bright); }
        .btn-buy { padding:8px 16px; background:var(--blue); color:#fff; border:none; border-radius:6px; font-family:'Sora',sans-serif; font-size:0.78rem; font-weight:700; cursor:pointer; transition:all 0.2s; text-decoration:none; white-space:nowrap; }
        .btn-buy:hover { background:var(--blue-dim); }

        /* Skeleton loader */
        .skeleton { background:linear-gradient(90deg,var(--dark3) 25%,var(--dark2) 50%,var(--dark3) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:8px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        @media(max-width:600px) {
            .products-grid { grid-template-columns:repeat(2,1fr); gap:10px; }
            .product-img-wrap { height:120px; }
            .product-body { padding:12px; }
            .product-desc { display:none; }
            .product-name { font-size:0.82rem; }
        }

        footer { position:relative; z-index:1; text-align:center; padding:24px; border-top:1px solid var(--border2); color:var(--muted); font-size:0.8rem; }
        footer span { color:var(--blue-bright); }
    </style>
</head>
<body>
    <div class="glow-blue"></div>
    <nav>
        <a href="/" class="nav-logo">ZENO<span>STORE</span></a>
        <ul class="nav-links">
            <li><a href="/products" style="color:var(--blue-bright)">Produk</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
        </ul>
        <div class="nav-buttons" id="navButtons"></div>
    </nav>

    <div class="page-hero">
        <div class="section-tag">// Katalog</div>
        <h1>SEMUA PRODUK</h1>
        <p>Plugin, Asset, Backup Server, dan Jasa Website untuk Minecraft kamu</p>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filter('all',this)">Semua</button>
        <button class="filter-btn" onclick="filter('plugin',this)">Plugin</button>
        <button class="filter-btn" onclick="filter('asset',this)">Asset</button>
        <button class="filter-btn" onclick="filter('backup',this)">Backup</button>
        <button class="filter-btn" onclick="filter('jasa',this)">Jasa</button>
    </div>

    <div class="products-wrap">
        <div class="products-grid" id="productsGrid">
            <!-- Skeleton -->
            ${Array(8).fill(`<div class="product-card"><div class="product-img-wrap skeleton"></div><div class="product-body"><div class="skeleton" style="height:12px;width:60%;margin-bottom:8px;"></div><div class="skeleton" style="height:16px;margin-bottom:8px;"></div><div class="skeleton" style="height:12px;margin-bottom:4px;"></div><div class="skeleton" style="height:12px;width:80%;"></div></div></div>`).join('')}
        </div>
    </div>

    <footer><p>© 2024 <span>Zeno Store</span> — All Rights Reserved</p></footer>

    <script>
        const user = JSON.parse(localStorage.getItem('zenoUser') || 'null');
        const catIcons = { plugin:'🔌', asset:'🎨', backup:'💾', jasa:'🌐' };

        function renderProducts(list) {
            const grid = document.getElementById('productsGrid');
            if (!list.length) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted)"><div style="font-size:2.5rem;margin-bottom:10px">📦</div><p>Tidak ada produk</p></div>`;
                return;
            }
            grid.innerHTML = list.map(p => `
                <div class="product-card">
                    <div class="product-img-wrap">
                        <img src="${p.img}" alt="${p.name}"
                            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                        <div class="product-img-fallback">
                            <div class="fi">${catIcons[p.cat]||'📦'}</div>
                            <span>${p.catLabel}</span>
                        </div>
                        ${p.badge ? `<div class="product-badge-pos"><span class="badge badge-blue">${p.badge}</span></div>` : ''}
                    </div>
                    <div class="product-body">
                        <div class="product-cat">${p.catLabel}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-desc">${p.desc}</div>
                        <div class="product-footer">
                            <div class="product-price">${p.price}</div>
                            <a href="/checkout?id=${p.id}" class="btn-buy" onclick="return checkLogin(event)">Beli</a>
                        </div>
                    </div>
                </div>`).join('');
        }

        let allProducts = [];

        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                const data = await res.json();
                allProducts = data.products;
                renderProducts(allProducts);
            } catch {
                document.getElementById('productsGrid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">Gagal memuat produk. Refresh halaman.</div>`;
            }
        }

        function filter(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProducts(cat === 'all' ? allProducts : allProducts.filter(p => p.cat === cat));
        }

        function checkLogin(e) {
            if (!user) {
                e.preventDefault();
                if (confirm('Kamu harus login dulu. Mau login sekarang?')) location.href = '/login';
                return false;
            }
            return true;
        }

        loadProducts();
    </script>
    <script src="/navbar.js"></script>
    <script>initNavbar('products');</script>
</body>
</html>
