<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar — Zeno Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .wrap { position:relative; z-index:1; width:100%; max-width:420px; }
        .back { display:inline-flex; align-items:center; gap:6px; color:var(--text2); text-decoration:none; font-size:0.82rem; font-weight:500; margin-bottom:28px; transition:color 0.2s; }
        .back:hover { color:var(--purple2); }
        .logo { font-weight:700; font-size:1.1rem; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:6px; }
        .title { font-size:1.8rem; font-weight:700; letter-spacing:-1px; margin-bottom:4px; }
        .sub { color:var(--text2); font-size:0.88rem; margin-bottom:28px; }
        .hint { font-size:0.75rem; color:var(--muted); margin-top:5px; }
        .hint.err { color:var(--error); }
        .strength-bar { height:3px; background:var(--border2); border-radius:2px; margin-top:7px; overflow:hidden; }
        .strength-fill { height:100%; border-radius:2px; transition:width 0.3s,background 0.3s; width:0; }
        .divider { display:flex; align-items:center; gap:10px; margin:20px 0; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border2); }
        .divider span { font-size:0.72rem; color:var(--muted); }
        .bottom { text-align:center; font-size:0.88rem; color:var(--text2); }
        .bottom a { color:var(--purple2); text-decoration:none; font-weight:600; }
    </style>
</head>
<body>
    <div class="bg-anim"><div class="bg-grid"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
    <div class="wrap">
        <a href="/" class="back">← Kembali</a>
        <div class="card card-glow">
            <div class="logo">ZenoStore</div>
            <h1 class="title">Buat Akun</h1>
            <p class="sub">Daftar gratis dan mulai belanja</p>

            <div class="alert alert-error" id="alertError"></div>
            <div class="alert alert-success" id="alertSuccess"></div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="username kamu" oninput="chkUser()">
                <div class="hint" id="hUser">Minimal 3 karakter</div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="email@kamu.com" oninput="chkEmail()">
                <div class="hint" id="hEmail"></div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" oninput="chkPass()">
                <div class="strength-bar"><div class="strength-fill" id="sFill"></div></div>
                <div class="hint" id="hPass">Minimal 6 karakter</div>
            </div>
            <div class="form-group">
                <label>Konfirmasi Password</label>
                <input type="password" id="confirmPass" placeholder="••••••••" oninput="chkConfirm()">
                <div class="hint" id="hConfirm"></div>
            </div>

            <button class="btn btn-primary btn-full" id="btnReg" onclick="handleRegister()">Daftar Sekarang</button>
            <div class="divider"><span>atau</span></div>
            <div class="bottom">Sudah punya akun? <a href="/login">Masuk</a></div>
        </div>
    </div>
    <script>
        function chkUser(){const v=document.getElementById('username').value.trim(),i=document.getElementById('username'),h=document.getElementById('hUser');if(v.length>=3){i.className='valid';h.textContent='✓ OK';h.className='hint';}else{i.className='';h.textContent='Minimal 3 karakter';h.className='hint';}}
        function chkEmail(){const v=document.getElementById('email').value.trim(),i=document.getElementById('email'),h=document.getElementById('hEmail'),ok=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);if(ok){i.className='valid';h.textContent='✓ Email valid';h.className='hint';}else if(v){i.className='invalid';h.textContent='Format tidak valid';h.className='hint err';}else{i.className='';h.textContent='';}}
        function chkPass(){const v=document.getElementById('password').value,f=document.getElementById('sFill'),h=document.getElementById('hPass');let s=0;if(v.length>=6)s++;if(v.length>=10)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;const c=['#f43f5e','#f59e0b','#f59e0b','#10b981','#8b5cf6'],l=['','Lemah','Cukup','Bagus','Kuat','Sangat Kuat'];f.style.width=(s*20)+'%';f.style.background=c[Math.max(0,s-1)];h.textContent=s>0?'Kekuatan: '+l[s]:'Minimal 6 karakter';chkConfirm();}
        function chkConfirm(){const p=document.getElementById('password').value,c=document.getElementById('confirmPass').value,i=document.getElementById('confirmPass'),h=document.getElementById('hConfirm');if(!c)return;if(p===c){i.className='valid';h.textContent='✓ Cocok';h.className='hint';}else{i.className='invalid';h.textContent='Tidak cocok';h.className='hint err';}}
        async function handleRegister(){
            const username=document.getElementById('username').value.trim(),email=document.getElementById('email').value.trim(),password=document.getElementById('password').value,confirm=document.getElementById('confirmPass').value,btn=document.getElementById('btnReg');
            hide('alertError');hide('alertSuccess');
            if(!username||!email||!password||!confirm)return show('alertError','Semua field harus diisi!');
            if(username.length<3)return show('alertError','Username minimal 3 karakter!');
            if(password.length<6)return show('alertError','Password minimal 6 karakter!');
            if(password!==confirm)return show('alertError','Password tidak cocok!');
            btn.disabled=true;btn.textContent='Memproses...';
            try{
                const res=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})});
                const data=await res.json();
                if(data.success){show('alertSuccess',data.message);setTimeout(()=>location.href='/login',1500);}
                else{show('alertError',data.message);btn.disabled=false;btn.textContent='Daftar Sekarang';}
            }catch{show('alertError','Terjadi kesalahan.');btn.disabled=false;btn.textContent='Daftar Sekarang';}
        }
        function show(id,msg){const el=document.getElementById(id);el.textContent=msg;el.style.display='block';}
        function hide(id){document.getElementById(id).style.display='none';}
    </script>
    <script src="/navbar.js"></script>
    <script>initNavbar('register');</script>
</body>
</html>
